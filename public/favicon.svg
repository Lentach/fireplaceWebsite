<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- the exposed core: a black hole with its warm horizon + doppler arc -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="52%" stop-color="#ffb266" stop-opacity="0"/>
      <stop offset="70%" stop-color="#ffb266" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#ffb266" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#halo)"/>
  <circle cx="32" cy="32" r="20" fill="#02050a"/>
  <circle cx="32" cy="32" r="20.5" fill="none" stroke="#f4c98a" stroke-width="1.6" opacity=".85"/>
  <circle cx="32" cy="32" r="20.5" fill="none" stroke="#ffe3b0" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="34 200" stroke-dashoffset="-58" opacity=".95"/>
</svg>
